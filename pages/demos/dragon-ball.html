<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Instinct Awakens — Pretext Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-ink: #07070f;
    --bg-shadow: #111220;
    --bg-ember: rgba(255, 116, 72, 0.16);
    --bg-ui: rgba(146, 214, 255, 0.14);
    --gold: rgba(255, 220, 140, 0.82);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background:
      radial-gradient(48vw 52vh at 28% 58%, rgba(64, 128, 220, 0.12), transparent 62%),
      radial-gradient(38vw 42vh at 74% 34%, rgba(190, 46, 34, 0.12), transparent 60%),
      linear-gradient(180deg, #0b0b16 0%, var(--bg-ink) 48%, #05050b 100%);
    color: #e8e4df;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    cursor: default;
  }
  #stage {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  #stage::before,
  #stage::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  #stage::before {
    background:
      radial-gradient(24vw 32vh at 30% 62%, var(--bg-ui), transparent 72%),
      radial-gradient(28vw 34vh at 72% 34%, var(--bg-ember), transparent 74%);
    opacity: 0.85;
  }
  #stage::after {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.02), transparent 12%, transparent 88%, rgba(255,255,255,0.02)),
      repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 5px);
    mix-blend-mode: screen;
    opacity: 0.08;
  }
  .line {
    position: absolute;
    white-space: pre;
    pointer-events: none;
    will-change: transform, opacity;
    padding: 0 2px;
    border-radius: 2px;
  }
  canvas.fx {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* --- Title --- */
  .title {
    position: fixed;
    top: 28px;
    left: 40px;
    z-index: 30;
    pointer-events: none;
    text-align: left;
  }
  .title-main {
    display: block;
    font: 900 38px/1.05 "Cinzel Decorative", "Cinzel", "Palatino Linotype", "Book Antiqua", Palatino, serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,180,60,0.2), 0 2px 0 rgba(0,0,0,0.5);
  }
  .title-sub {
    display: block;
    margin-top: 6px;
    font: 700 16px/1.2 "Cinzel", "Palatino Linotype", "Book Antiqua", Palatino, serif;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,200,120,0.45);
  }

  /* --- DBS logo --- */
  .dbs-logo {
    position: fixed;
    bottom: 24px;
    right: 28px;
    z-index: 5;
    pointer-events: none;
    height: 140px;
    width: auto;
    opacity: 0.45;
  }

  .hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font: 12px/1.4 "SF Mono", ui-monospace, monospace;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.04em;
    z-index: 20;
    pointer-events: none;
    text-align: center;
  }
  .credit {
    position: fixed;
    top: 12px;
    right: 16px;
    font: 11px/1.3 "SF Mono", ui-monospace, monospace;
    color: rgba(255,255,255,0.2);
    text-decoration: none;
    z-index: 20;
  }
  .credit:hover { color: rgba(255,255,255,0.5); }

  @media (max-width: 600px) {
    .title { top: 16px; left: 20px; }
    .title-main { font-size: 24px; }
    .title-sub { font-size: 11px; margin-top: 4px; }
    .dbs-logo { height: 80px; bottom: 14px; right: 14px; }
  }
</style>
</head>
<body>
  <div id="stage"></div>

  <div class="title">
    <span class="title-main">Tournament of Power</span>
    <span class="title-sub">Ultra Instinct Awakens</span>
  </div>

  <img class="dbs-logo" src="../assets/dragon-ball-super.png" alt="Dragon Ball Super">

  <div class="hint">Text reflows around the battle in real time. Add <code>?freeze=transform</code>, <code>?freeze=clash</code>, or <code>?debugParts</code> to inspect the rig.</div>
  <a class="credit" href="/demos">Pretext Demos</a>
  <script type="module" src="./dragon-ball.ts"></script>
</body>
</html>
